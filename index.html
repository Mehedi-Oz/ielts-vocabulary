<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A comprehensive vocabulary learning platform. Organize, search, filter, and practice essential academic vocabulary, expressions, and language patterns.">
  <title>VocabHub</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Top Bar -->
  <header class="topbar">
    <div class="topbar-left">
      <div class="topbar-brand">
        <span class="brand-mark">V</span>
        <span class="brand-text">Vocab<span>Hub</span></span>
      </div>
    </div>
    <div class="topbar-center">
      <div class="search-box">
        <span class="search-box-icon">🔍</span>
        <input type="text" id="search-vocab" class="search-box-input" placeholder="Search words, meanings, expressions...">
      </div>
    </div>
    <div class="topbar-right">
      <button id="theme-toggle" class="icon-btn" aria-label="Toggle theme">🌙</button>
      <button id="btn-add-word" class="icon-btn icon-btn-primary" aria-label="Add word">➕</button>
      <button id="btn-practice" class="icon-btn icon-btn-primary" aria-label="Practice">🧠</button>
    </div>
  </header>

  <!-- Category Tabs -->
  <nav class="cat-strip" id="cat-strip">
    <button class="cat-tab active" data-category="" data-subcategory="" data-show="all">
      All <span class="cat-count" id="count-all">382</span>
    </button>
    <button class="cat-tab" data-category="Vocabulary" data-subcategory="" data-show="all">
      Vocabulary <span class="cat-count" id="count-vocab">0</span>
    </button>
    <button class="cat-tab" data-category="Synonyms" data-subcategory="" data-show="all">
      Synonyms <span class="cat-count" id="count-synonyms">0</span>
    </button>
    <button class="cat-tab" data-category="Idioms & Phrases" data-subcategory="" data-show="all">
      Idioms <span class="cat-count" id="count-idioms">0</span>
    </button>
    <button class="cat-tab" data-category="Topic-Based Vocabulary" data-subcategory="" data-show="all">
      Topics <span class="cat-count" id="count-topics">0</span>
    </button>
    <div class="cat-strip-divider"></div>
    <button class="cat-tab cat-tab-secondary" data-category="" data-subcategory="" data-show="bookmarks">
      ⭐ <span class="cat-count" id="count-bookmarks">0</span>
    </button>
    <button class="cat-tab cat-tab-secondary" data-category="" data-subcategory="" data-show="unmastered">
      ⏰ Review
    </button>
    <button class="cat-tab cat-tab-secondary" data-category="" data-subcategory="" data-show="mastered">
      ✅ Mastered
    </button>
  </nav>

  <!-- Main Layout -->
  <div class="app-body">

    <!-- Filters + Alphabet + Results -->
    <div class="controls-rail">
      <div class="filters-row">
        <div class="select-group">
          <select id="filter-difficulty" class="filter-select" aria-label="Difficulty">
            <option value="">All Levels</option>
            <option value="Basic">Basic</option>
            <option value="Intermediate">Intermediate</option>
            <option value="Advanced">Advanced</option>
          </select>
        </div>
        <div class="select-group">
          <select id="filter-subcategory" class="filter-select" aria-label="Subcategory">
            <option value="">All Topics</option>
          </select>
        </div>
        <div class="select-group">
          <select id="sort-vocab" class="filter-select" aria-label="Sort">
            <option value="alpha-asc">A → Z</option>
            <option value="alpha-desc">Z → A</option>
            <option value="difficulty-asc">Easy first</option>
            <option value="difficulty-desc">Hard first</option>
          </select>
        </div>

      </div>

      <div id="alphabet-scroller" class="alpha-strip"></div>

      <div class="results-bar">
        <span id="stat-showing-count">Showing 0 of 0</span>
        <div class="progress-chip" id="progress-chip">
          <span class="progress-chip-bar"><span class="progress-chip-fill" id="progress-chip-fill"></span></span>
          <span id="progress-chip-text">0% mastered</span>
        </div>
      </div>
    </div>

    <!-- Cards Grid -->
    <section class="cards-zone">
      <div id="cards-grid" class="cards-grid"></div>
    </section>

  </div>

  <!-- Add Word Slide Panel -->
  <aside class="panel-overlay" id="add-word-panel">
    <div class="panel">
      <div class="panel-head">
        <h3 class="panel-title">➕ Add word</h3>
        <button class="panel-close" id="panel-close" aria-label="Close">✕</button>
      </div>
      <form id="add-word-form" class="panel-body">
        <div class="panel-field">
          <label class="panel-label">Word *</label>
          <input type="text" id="input-word" class="panel-input" required placeholder="e.g. flourish">
        </div>
        <div class="panel-field">
          <label class="panel-label">Meaning *</label>
          <textarea id="input-meaning" class="panel-input panel-textarea" required rows="3" placeholder="Definition..."></textarea>
        </div>
        <div class="panel-field">
          <label class="panel-label">Synonyms</label>
          <input type="text" id="input-synonyms" class="panel-input" placeholder="flourish, thrive, boom">
        </div>
        <div class="panel-field">
          <label class="panel-label">Example</label>
          <textarea id="input-example" class="panel-input panel-textarea" rows="2" placeholder="Usage example..."></textarea>
        </div>
        <div class="panel-field">
          <label class="panel-label">IELTS example</label>
          <textarea id="input-ielts-example" class="panel-input panel-textarea" rows="2" placeholder="IELTS context..."></textarea>
        </div>
        <div class="panel-row">
          <div class="panel-field">
            <label class="panel-label">Category *</label>
            <select id="input-category" class="panel-input panel-select" required>
              <option value="">Select</option>
              <option value="Vocabulary">Vocabulary</option>
              <option value="Synonyms">Synonyms</option>
              <option value="Idioms & Phrases">Idioms & Phrases</option>
              <option value="Topic-Based Vocabulary">Topic-Based</option>
            </select>
          </div>
          <div class="panel-field">
            <label class="panel-label">Subcategory</label>
            <select id="input-subcategory" class="panel-input panel-select">
              <option value="">None</option>
            </select>
          </div>
          <div class="panel-field">
            <label class="panel-label">Level *</label>
            <select id="input-difficulty" class="panel-input panel-select" required>
              <option value="">Select</option>
              <option value="Basic">Basic</option>
              <option value="Intermediate">Intermediate</option>
              <option value="Advanced">Advanced</option>
            </select>
          </div>
        </div>
        <div class="panel-actions">
          <button type="button" class="btn-ghost" onclick="closeAddWordPanel()">Cancel</button>
          <button type="submit" class="btn-primary">Save word</button>
        </div>
      </form>
    </div>
  </aside>

  <!-- Practice Overlay -->
  <div class="practice-overlay" id="practice-overlay">
    <div class="practice-head">
      <div class="practice-progress-track">
        <div class="practice-progress-fill" id="practice-progress-fill"></div>
      </div>
      <button class="practice-close" id="practice-close" aria-label="Close">✕</button>
    </div>
    <div class="practice-body">
      <div class="flashcard-stage" onclick="flipFlashcard()">
        <div class="flashcard" id="practice-card">
          <div class="flashcard-face flashcard-front" id="flashcard-front-content"></div>
          <div class="flashcard-face flashcard-back" id="flashcard-back-content"></div>
        </div>
      </div>
      <div class="practice-counter" id="flashcard-index-display">0 / 0</div>
      <div class="practice-controls">
        <button id="btn-practice-master" class="btn-secondary" onclick="handlePracticeMaster()">✅ Mastered</button>
        <button id="btn-practice-next" class="btn-primary" onclick="handlePracticeNext()">Next →</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/db-helpers.js"></script>
  <script src="js/app-supabase.js"></script>
</body>
</html>
